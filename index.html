<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midwest Division B1G | Spring Football</title>
    <style>
        :root {
            --b1g-navy: #1a2b49;
            --pure-white: #ffffff;
            --accent-blue: #00529b;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            background-color: #000;
            color: var(--b1g-navy);
            overflow-x: hidden;
        }

        /* Top Hero Section with Angled Bottom */
        .hero-section {
            background-color: var(--b1g-navy);
            height: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
            position: relative;
        }

        .main-shield {
            width: 280px;
            z-index: 10;
        }

        /* Content Area with Angled Top */
        .content-container {
            background-color: var(--pure-white);
            margin-top: -60px; /* Overlap the hero */
            padding: 100px 10% 60px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 40px;
            min-height: 800px;
        }

        .left-column {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .info-text {
            font-family: 'Helvetica', sans-serif;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #333;
        }

        /* 18 Teams Circle */
        .teams-badge {
            background-color: var(--b1g-navy);
            color: white;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .teams-badge h2 { font-size: 5rem; margin: 0; line-height: 1; }
        .teams-badge p { font-size: 1.5rem; margin: 0; letter-spacing: 2px; }

        /* Right Column Geometric Blocks */
        .right-column {
            position: relative;
        }

        .navy-block {
            background-color: var(--b1g-navy);
            width: 100%;
            height: 500px;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0% 100%);
        }

        .lower-navy-block {
            background-color: var(--b1g-navy);
            width: 100%;
            height: 250px;
            margin-top: 50px;
        }

        /* Styling for your "COMMITTED" Ink Stamp */
        .stamp-overlay {
            width: 200px;
            transform: rotate(-15deg);
            opacity: 0.9;
        }

    </style>
</head>
<body>

    <section class="hero-section">
        <img src="b1g_midwest_shield.png" alt="B1G Midwest Shield" class="main-shield">
    </section>

    <main class="content-container">
        
        <div class="left-column">
            <div class="info-text">
                This is where information about the league goes. It will include a welcome and thanks for stopping by message. It will also include general rules and what this site is all about. I want it to be for every B1G school, so every school needs to be represented.
            </div>

            <div class="teams-badge">
                <h2>18</h2>
                <p>TEAMS</p>
            </div>
        </div>

        <div class="right-column">
            <div class="navy-block">
                </div>
            <div class="lower-navy-block">
                </div>
        </div>

    </main>

</body>
</html>
